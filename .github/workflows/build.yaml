name: Build

on:
  push:
    branches:
      - main
  workflow_dispatch:

# Ensure that the workflow is only triggered once per PR, subsequent pushes to
# the PR will cancel and restart the workflow.
# See https://docs.github.com/en/actions/using-jobs/using-concurrency
concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  setup-buildroot:
    runs-on: ubuntu-22.04
    timeout-minutes: 90

    steps:
    - name: Checkout repository
      uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1

    - name: Run Build
      run: docker compose run --rm build-app
