services:
  build-image:
    image: builder
    command: bash -c "echo build-image completed."
    build: .
  build-app:
    image: builder
    command: bash -c "make build-app"
    depends_on:
      - build-image
    volumes:
      - .:/app
    user: "${UID:-1000}:${GID:-1000}"
    working_dir: /app
